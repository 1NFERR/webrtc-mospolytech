<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>WebRTC 4 Cameras</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #121212;
        --panel: #1e1e1e;
        --muted: #a0a0a0;
        --text: #f5f5f5;
        --border: #333333;
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        background: radial-gradient(1200px 700px at 30% 10%, #2a2a2a 0%, var(--bg) 60%);
        color: var(--text);
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      header {
        padding: 16px 18px;
        border-bottom: 1px solid var(--border);
        background: rgba(30, 30, 30, 0.7);
        backdrop-filter: blur(8px);
        flex-shrink: 0;
        z-index: 10;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }
      .title {
        font-weight: 700;
        letter-spacing: 0.2px;
        margin-right: 10px;
      }
      input {
        background: #222222;
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 12px;
        min-width: 320px;
      }
      button {
        background: #e0e0e0;
        color: #121212;
        border: 0;
        border-radius: 10px;
        padding: 10px 12px;
        font-weight: 600;
        cursor: pointer;
      }
      button.secondary {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text);
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      main {
        padding: 16px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        flex: 1;
        min-height: 0;
      }
      .panel {
        background: rgba(30, 30, 30, 0.85);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px;
      }
      .panel.video-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      .panel.log-panel {
        flex-shrink: 0;
      }
      #grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        grid-auto-rows: minmax(0, 1fr);
        gap: 12px;
        flex: 1;
        min-height: 0;
      }
      .tile {
        position: relative;
        background: #000000;
        border: 1px solid var(--border);
        border-radius: 14px;
        overflow: hidden;
        min-height: 0;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .label {
        position: absolute;
        top: 10px;
        left: 10px;
        font-size: 12px;
        color: var(--muted);
        background: rgba(0, 0, 0, 0.7);
        border: 1px solid rgba(51, 51, 51, 0.8);
        border-radius: 999px;
        padding: 6px 10px;
      }
      video {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }
      #log {
        width: 100%;
        height: 120px;
        overflow: auto;
        border-radius: 12px;
        padding: 10px;
        background: #0a0a0a;
        border: 1px solid var(--border);
        color: #cccccc;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        font-size: 12px;
        line-height: 1.4;
        white-space: pre;
      }
      .status {
        color: var(--muted);
        font-size: 13px;
      }
      @media (max-width: 900px) {
        input {
          min-width: 240px;
          flex: 1;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="row">
        <div class="title">WebRTC + WebSocket (4 Cameras)</div>
        <input id="wsUrl" placeholder="ws://127.0.0.1:8765" />
        <button id="connect">Connect</button>
        <button id="disconnect" class="secondary">Disconnect</button>
        <div class="status" id="status">idle</div>
      </div>
    </header>
    <main>
      <div class="panel video-panel">
        <div id="grid"></div>
      </div>
      <div class="panel log-panel">
        <div style="margin-bottom: 8px; color: #a0a0a0; font-size: 13px">Log</div>
        <div id="log"></div>
      </div>
    </main>
    <script type="module" src="./dist/main.js"></script>
  </body>
</html>
